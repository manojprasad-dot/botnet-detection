version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kovirx_postgres
    restart: always
    environment:
      POSTGRES_USER: kovirx
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kovirx}
      POSTGRES_DB: kovirx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kovirx -d kovirx"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kovirx_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: kovirx_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://kovirx:${DB_PASSWORD:-kovirx}@postgres:5432/kovirx
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production-use-long-random-string}
      - JWT_ALGORITHM=HS256
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ALLOWED_ORIGINS=*
      - DEBUG=False
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: kovirx_celery
    command: celery -A app.core.celery_app worker --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://kovirx:${DB_PASSWORD:-kovirx}@postgres:5432/kovirx
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production-use-long-random-string}
      - JWT_ALGORITHM=HS256
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
