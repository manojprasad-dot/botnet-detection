version: "3.9"

services:
  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      ALLOWED_ORIGINS: "*"
      ALERT_DNS_ENTROPY_THRESHOLD: 4.0
      ALERT_CONNECTION_THRESHOLD: 120
    ports:
      - "8000:8000"
